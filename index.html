<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator sadzonek</title>

<style>
:root {
  --bg: linear-gradient(135deg, #1f2937, #111827);
  --card: rgba(255,255,255,0.05);
  --text: white;
  --input: rgba(0,0,0,0.4);
  --border: rgba(255,255,255,0.1);
}

.light {
  --bg: linear-gradient(135deg, #e5e7eb, #f9fafb);
  --card: rgba(255,255,255,0.8);
  --text: #111;
  --input: rgba(255,255,255,0.9);
  --border: rgba(0,0,0,0.1);
}

* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.container {
  width: 520px;
  padding: 30px;
  border-radius: 16px;
  background: var(--card);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  border: 1px solid var(--border);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  cursor: pointer;
  font-size: 18px;
}

select, input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--input);
  color: var(--text);
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  background: var(--input);
  text-align: center;
}

.footer {
  text-align: center;
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
  <div class="toggle" onclick="toggleTheme()">🌙</div>

  <h1>🌱 Kalkulator sadzonek 🌱</h1>

  <select id="type">
    <option value="">-- Wybierz odmianę --</option>
    <option value="amnezja">Amnezja</option>
    <option value="kush">Kush</option>
    <option value="shaman">Shaman</option>
    <option value="mimosa">Mimosa</option>
  </select>

  <input type="number" id="amount" placeholder="Ilość sadzonek">

  <select id="vehicle">
    <option value="30">🚗 Surfer (30kg)</option>
    <option value="35">🚐 Moonbeam (35kg)</option>
    <option value="35">🚐 Slamvan (35kg)</option>
    <option value="45">🚙 Guardian (45kg)</option>
    <option value="45">🚙 Sandking (45kg)</option>
    <option value="90">🚁 Volatus (90kg)</option>
  </select>

  <select id="sellType">
    <option value="dealer">💰 Dealer (1750$)</option>
    <option value="hidden">🕵️ Ukryty diler (2100$)</option>
    <option value="player">👤 Sprzedaż graczowi</option>
  </select>

  <input type="number" id="price" placeholder="Cena dla gracza (np. 900)">

  <button onclick="calculate()">Oblicz</button>

  <div class="result" id="result"></div>

  <div class="footer">By Sooga</div>
</div>

<script>
// 🌗 THEME
function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}
if (localStorage.getItem("theme") === "light") {
  document.body.classList.add("light");
}

// 🔥 LIMIT zależny od odmiany
const typeSelect = document.getElementById("type");
const amountInput = document.getElementById("amount");

typeSelect.addEventListener("change", function() {
  switch(this.value) {
    case "amnezja":
      amountInput.max = 100;
      amountInput.placeholder = "Ilość (max 100)";
      break;
    case "kush":
      amountInput.max = 50;
      amountInput.placeholder = "Ilość (max 50)";
      break;
    case "shaman":
      amountInput.max = 25;
      amountInput.placeholder = "Ilość (max 25)";
      break;
    case "mimosa":
      amountInput.max = 12; 
      amountInput.placeholder = "Ilość (max 12)";
      break;
    default:
      amountInput.removeAttribute("max");
      amountInput.placeholder = "Ilość sadzonek";
  }
});

// 📊 kalkulator
function calculate() {
  const vehicleCapacity = parseInt(document.getElementById("vehicle").value);
  const sellType = document.getElementById("sellType").value;
  const price = parseFloat(document.getElementById("price").value);
  const type = typeSelect.value;
  const amount = parseInt(amountInput.value);
  const resultDiv = document.getElementById("result");

  if (!type || !amount || amount <= 0) {
    resultDiv.innerHTML = "⚠️ Uzupełnij wszystkie pola!";
    return;
  }

  // Limity
  if ((type === "amnezja" && amount > 100) || 
      (type === "kush" && amount > 50) || 
      (type === "shaman" && amount > 25) ||
      (type === "mimosa" && amount > 12)) {
    resultDiv.innerHTML = "❌ Przekroczono limit sadzonek!";
    return;
  }

  let data = {
    amnezja: {water:5,fertilizer:2,yield:36,exp:20,points:1,grindLvl:1,potLvl:2,time:120},
    kush: {water1:10,water2:5,fertilizer1:4,fertilizer2:2,yield:72,exp:50,points:2,grindLvl:3,potLvl:4,time:120},
    shaman: {water1:21,water2:10,water5:4,fertilizer:8,yield:132,exp:100,points:4,grindLvl:5,potLvl:6,time:60},
    mimosa: {water:12,fertilizer:3,yield:360,exp:200,points:8,grindLvl:7,potLvl:8,time:180}
  };

  // Woda i nawóz
  let waterText = "";
  let fertilizerText = "";
  if(type==="amnezja"){
    waterText = `${amount*data[type].water} x 1L <small>(jedna daje 50%)</small>`;
    fertilizerText = `${amount*data[type].fertilizer} x 0.3L <small>(jedna daje 60%)</small>`;
  } else if(type==="kush"){
    waterText = `${amount*data[type].water1} x 1L <small>(25%)</small><br>${amount*data[type].water2} x 2L <small>(50%)</small>`;
    fertilizerText = `${amount*data[type].fertilizer1} x 0.3L <small>(30%)</small><br>${amount*data[type].fertilizer2} x 0.6L <small>(60%)</small>`;
  } else if(type==="shaman"){
    waterText = `${amount*data[type].water1} x 1L <small>(13%)</small><br>${amount*data[type].water2} x 2L (.soon)<br>${amount*data[type].water5} x 5L (.soon)`;
    fertilizerText = `${amount*data[type].fertilizer} x 0.3L <small>(20%)</small>`;
  } else if(type==="mimosa"){
    waterText = `${amount*data[type].water} x 1L <small>(40%)</small>`;
    fertilizerText = `${amount*data[type].fertilizer} x 0.3L <small>(50%)</small>`;
  }

  // Plony i punkty
  let wet = 0, dry = 0;
  if(type==="amnezja") {wet=amount*40; dry=amount*20;}
  else if(type==="kush") {wet=amount*72; dry=amount*36;}
  else if(type==="shaman") {wet=amount*132; dry=amount*66;}
  else if(type==="mimosa") {wet=amount*360; dry=amount*180;}

  let wetWeight = wet/12; // przykładowa waga 1 mokrego=0.083 kg
  let dryWeight = dry/12; // 1 suche=0.083 kg

  let tripsWet = Math.ceil(wetWeight/vehicleCapacity);
  let tripsDry = Math.ceil(dryWeight/vehicleCapacity);

  // Koszty
  let waterCost = type==="amnezja"?amount*5*10 : type==="kush"?(amount*10*10 + amount*5*20):0;
  let fertilizerCost = type==="amnezja"?amount*2*50: type==="kush"?(amount*4*50+amount*2*100):0;
  let totalCost = waterCost + fertilizerCost;

  // Liczba działek
  let unit = 20;
  let units = Math.ceil(dry/unit);

  // Sprzedaż
  let dealerPrice = 1750;
  let hiddenPrice = 2100;
  if(type==="amnezja") {dealerPrice=1750; hiddenPrice=1850;}
  if(type==="kush") {dealerPrice=1750; hiddenPrice=1850;}
  if(type==="shaman") {dealerPrice=1750; hiddenPrice=1850;}
  if(type==="mimosa") {dealerPrice=1750; hiddenPrice=1850;}

  let income = 0;
  let label = "";
  if(sellType==="dealer"){income=units*dealerPrice; label=`Dealer (${dealerPrice}$)`;}
  else if(sellType==="hidden"){income=units*hiddenPrice; label=`Ukryty diler (${hiddenPrice}$)`;}
  else if(sellType==="player"){income=price?units*price:0; label=`Sprzedaż graczowi`;}

  let profit = income - totalCost;

  resultDiv.innerHTML = `
    🌱 <b>${amount}</b> sadzonek<br>
    <small>Gruntowe sadzenie</small><br><br>
    🎗️ Poziomy umiejętności:<br>
    gruntowe: ${data[type].grindLvl} lvl<br>
    doniczkowe: ${data[type].potLvl} lvl<br><br>
    🥤 Woda:<br>${waterText}<br><br>
    ⛱️ Nawóz:<br>${fertilizerText}<br><br>
    ⏰ Czas: <b>${data[type].time} min</b><br>
    🌿 Plony: <b>${wet} mokrego / ${dry} suchego</b><br>
    🔹 Punkty upraw: <b>${data[type].points*amount}</b><br><br>
    ⚖️ Waga mokre: <b>${wetWeight.toFixed(2)} kg</b><br>
    ⚖️ Waga suche: <b>${dryWeight.toFixed(2)} kg</b><br><br>
    🚗 Transport:<br>
    Mokre: <b>${tripsWet}</b> kursów<br>
    Suche: <b>${tripsDry}</b> kursów<br><br>
    💰 Sprzedaż:<br>
    Tryb: <b>${label}</b><br>
    Przychód: <b>${income}$</b><br><br>
    💸 Koszty:<br>
    Woda: <b>${waterCost}$</b><br>
    Nawóz: <b>${fertilizerCost}$</b><br>
    Razem: <b>${totalCost}$</b><br><br>
    🔥 Zysk na czysto:<br>
    <b style="color:${profit>=0?'lime':'red'}">${profit}$</b>
  `;
}
</script>

</body>
</html>
