<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator sadzonek</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1f2937, #111827);
  --card: rgba(255,255,255,0.05);
  --text: white;
  --input: rgba(0,0,0,0.4);
  --border: rgba(255,255,255,0.1);
}
.light {
  --bg: linear-gradient(135deg, #e5e7eb, #f9fafb);
  --card: rgba(255,255,255,0.8);
  --text: #111;
  --input: rgba(255,255,255,0.9);
  --border: rgba(0,0,0,0.1);
}
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg); color: var(--text); transition: 0.3s; }
.container { width: 480px; padding: 30px; border-radius: 16px; background: var(--card); backdrop-filter: blur(12px); box-shadow: 0 10px 40px rgba(0,0,0,0.4); border: 1px solid var(--border); }
h1 { text-align: center; margin-bottom: 20px; }
.toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 18px; }
select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--input); color: var(--text); margin-bottom: 15px; }
button { width: 100%; padding: 13px; border: none; border-radius: 10px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; cursor: pointer; }
.result { margin-top: 20px; padding: 15px; border-radius: 10px; background: var(--input); text-align: center; }
.footer { text-align: center; margin-top: 10px; font-size: 12px; opacity: 0.7; }
</style>
</head>
<body>

<div class="container">
  <div class="toggle" onclick="toggleTheme()">🌙</div>
  <h1>🌱 Kalkulator sadzonek 🌱</h1>

  <select id="type">
    <option value="">-- Wybierz odmianę --</option>
    <option value="amnezja">Amnezja</option>
    <option value="kush">Kush</option>
    <option value="shaman">Shaman</option>
    <option value="mimosa">Mimosa</option>
  </select>

  <input type="number" id="amount" placeholder="Ilość (max 100)" max="100">

  <select id="vehicle">
    <option value="30">🚗 Surfer (30kg)</option>
    <option value="35">🚐 Moonbeam (35kg)</option>
    <option value="35">🚐 Slamvan (35kg)</option>
    <option value="45">🚙 Guardian (45kg)</option>
    <option value="45">🚙 Sandking (45kg)</option>
    <option value="90">🚁 Volatus (90kg)</option>
  </select>

  <select id="sellType">
    <option value="dealer">💰 Dealer (1750$)</option>
    <option value="hidden">🕵️ Ukryty diler (2100$)</option>
    <option value="player">👤 Sprzedaż graczowi</option>
  </select>

  <input type="number" id="price" placeholder="Cena dla gracza (np. 900)">
  <button onclick="calculate()">Oblicz</button>
  <div class="result" id="result"></div>
  <div class="footer">By Sooga</div>
</div>

<script>
// 🌗 THEME
function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}
if(localStorage.getItem("theme")==="light"){document.body.classList.add("light");}

// 🔥 LIMIT zależny od odmiany
const typeSelect = document.getElementById("type");
const amountInput = document.getElementById("amount");
typeSelect.addEventListener("change", function() {
  switch(this.value){
    case "amnezja": amountInput.max=100; amountInput.placeholder="Ilość (max 100)"; break;
    case "kush": amountInput.max=50; amountInput.placeholder="Ilość (max 50)"; break;
    case "shaman": amountInput.max=25; amountInput.placeholder="Ilość (max 25)"; break;
    case "mimosa": amountInput.max=12; amountInput.placeholder="Ilość (max 12)"; break;
    default: amountInput.removeAttribute("max"); amountInput.placeholder="Ilość (brak limitu)";
  }
});

// 📊 KALKULATOR
function calculate(){
  const type = typeSelect.value;
  const amount = parseInt(amountInput.value);
  const vehicle = parseInt(document.getElementById("vehicle").value);
  const sellType = document.getElementById("sellType").value;
  const price = parseFloat(document.getElementById("price").value);
  const resultDiv = document.getElementById("result");
  if(!type||!amount){ resultDiv.innerHTML="⚠️ Uzupełnij wszystkie pola!"; return; }

  if( (type==="amnezja" && amount>100) ||
      (type==="kush" && amount>50) ||
      (type==="shaman" && amount>25) ||
      (type==="mimosa" && amount>12) ){
    resultDiv.innerHTML="❌ Przekroczono limit sadzonek!"; return;
  }

  // ✅ GLOBALNE ZMIENNE
  let wet=0,dry=0,wetWeight=0,dryWeight=0;
  let waterCost=0,fertilizerCost=0,totalCost=0;
  let income=0,profit=0,label="";
  let plantingType="Gruntowe sadzenie",skillLevels="",yieldMin=0,points=0,time="2 godziny";

  // 💚 DANE ODMIAN
  switch(type){
    case "amnezja":
      skillLevels="🎗️ Poziomy umiejętności:<br>gruntowe: 1 lvl<br>doniczkowe: 2 lvl";
      wet=amount*40; dry=amount*20; wetWeight=amount*3; dryWeight=amount*1.5;
      waterCost=amount*5*10; fertilizerCost=amount*2*50;
      yieldMin=amount*36; points=amount*1; time="2 godziny";
      break;
    case "kush":
      skillLevels="🎗️ Poziomy umiejętności:<br>gruntowe: 3 lvl<br>doniczkowe: 4 lvl";
      wet=amount*72; dry=amount*36; wetWeight=amount*7.2; dryWeight=amount*3.6;
      waterCost=amount*10*10; fertilizerCost=amount*4*50;
      yieldMin=amount*72; points=amount*2; time="2 godziny";
      break;
    case "shaman":
      skillLevels="🎗️ Poziomy umiejętności:<br>gruntowe: 5 lvl<br>doniczkowe: 6 lvl";
      wet=amount*132; dry=amount*66; wetWeight=amount*13.2; dryWeight=amount*6.6;
      waterCost=amount*21*10; fertilizerCost=amount*8*50;
      yieldMin=amount*132; points=amount*4; time="1 godzina";
      plantingType="Gruntowe sadzenie <span style='color:red;'>(Ryzyko zachorowania!)</span>";
      break;
    case "mimosa":
      skillLevels="🎗️ Poziomy umiejętności:<br>gruntowe: 7 lvl<br>doniczkowe: 8 lvl";
      wet=amount*360; dry=amount*180; wetWeight=amount*36; dryWeight=amount*18;
      waterCost=amount*30*10; fertilizerCost=amount*8*50; // Przykładowe koszty
      yieldMin=amount*360; points=amount*8; time="3 godziny";
      break;
  }

  totalCost=waterCost+fertilizerCost;

  // 💰 SPRZEDAŻ
  if(sellType==="dealer"){ income=dry*1750; label="Dealer (1750$)"; }
  else if(sellType==="hidden"){ income=dry*2100; label="Ukryty diler (2100$)"; }
  else if(sellType==="player"){ income=dry*(price||0); label="Gracz"; }

  profit=income-totalCost;
  const tripsWet=Math.ceil(wetWeight/vehicle);
  const tripsDry=Math.ceil(dryWeight/vehicle);

  // 🖥️ WYŚWIETLANIE
  resultDiv.innerHTML=`
🌱 <b>${amount}</b> sadzonek<br><small>${plantingType}</small><br><br>
${skillLevels}<br><br>
⏰ Czas: <b>${time}</b><br>
🌿 Plony: <b>~${yieldMin}</b><br>
🔹 Punkty upraw: <b>${points}</b><br><br>

🌿 Mokre: <b>${wet}</b><br>
🌿 Suche: <b>${dry}</b><br><br>

⚖️ Waga:<br>Mokre: <b>${wetWeight} kg</b><br>Suche: <b>${dryWeight} kg</b><br><br>

🚗 Transport:<br>Mokre: <b>${tripsWet}</b> kursów<br>Suche: <b>${tripsDry}</b> kursów<br><br>

💰 Sprzedaż:<br>Tryb: <b>${label}</b><br>Przychód: <b>${income}$</b><br><br>

💸 Koszty:<br>Woda: <b>${waterCost}$</b><br>Nawóz: <b>${fertilizerCost}$</b><br>Razem: <b>${totalCost}$</b><br><br>

🔥 Zysk na czysto:<br><b style="color:${profit>=0?'lime':'red'}">${profit}$</b>
`;
}
</script>
</body>
</html>
