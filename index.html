<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator sadzonek</title>

<!-- FONT GTA STYLE -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: radial-gradient(circle at top, #0f172a, #020617);
  --card: rgba(15, 23, 42, 0.85);
  --neon: #22c55e;
  --neon2: #3b82f6;
  --text: #e5e7eb;
  --border: rgba(255,255,255,0.08);
}

* {
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--bg);
  color:var(--text);
}

/* PANEL */
.container {
  width:520px;
  padding:30px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter:blur(20px);
  box-shadow:
    0 0 40px rgba(0,0,0,0.8),
    0 0 20px rgba(34,197,94,0.15);
  border:1px solid var(--border);
  position:relative;
}

/* HEADER */
h1 {
  text-align:center;
  margin-bottom:25px;
  font-size:22px;
  letter-spacing:2px;
  color:var(--neon);
  text-shadow:0 0 10px rgba(34,197,94,0.7);
}

/* INPUTY */
select, input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(0,0,0,0.5);
  color:var(--text);
  margin-bottom:15px;
  outline:none;
  transition:0.2s;
}

select:focus, input:focus {
  border-color:var(--neon);
  box-shadow:0 0 10px rgba(34,197,94,0.5);
}

/* PRZYCISK */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
  cursor:pointer;
  font-weight:600;
  letter-spacing:1px;
  transition:0.2s;
}

button:hover {
  transform:scale(1.03);
  box-shadow:0 0 15px rgba(34,197,94,0.6);
}

/* WYNIK */
.result {
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  background:rgba(0,0,0,0.6);
  text-align:center;
  font-size:14px;
  border:1px solid var(--border);
  box-shadow:inset 0 0 10px rgba(0,0,0,0.8);
}

/* MAŁY DETAL GTA */
.container::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:3px;
  background:linear-gradient(90deg, transparent, var(--neon), transparent);
  border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

  <h1>🌱 GROW CALCULATOR</h1>

  <select id="type">
    <option value="">-- WYBIERZ ODMIANĘ --</option>
    <option value="amnezja">AMNEZJA</option>
    <option value="kush">KUSH</option>
    <option value="shaman">SHAMAN</option>
    <option value="mimosa">MIMOSA</option>
  </select>

  <input type="number" id="amount" placeholder="ILOŚĆ SADZONEK">

  <button onclick="calculate()">OBLICZ</button>

  <div class="result" id="result">
    ▶️ Wprowadź dane, aby rozpocząć...
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
