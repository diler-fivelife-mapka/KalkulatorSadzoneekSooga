<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator sadzonek</title>

<style>
:root {
  --bg: linear-gradient(135deg, #1f2937, #111827);
  --card: rgba(255,255,255,0.05);
  --text: white;
  --input: rgba(0,0,0,0.4);
  --border: rgba(255,255,255,0.1);
}

.light {
  --bg: linear-gradient(135deg, #e5e7eb, #f9fafb);
  --card: rgba(255,255,255,0.8);
  --text: #111;
  --input: rgba(255,255,255,0.9);
  --border: rgba(0,0,0,0.1);
}

* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.container {
  width: 480px;
  padding: 30px;
  border-radius: 16px;
  background: var(--card);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  border: 1px solid var(--border);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  cursor: pointer;
  font-size: 18px;
}

select, input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--input);
  color: var(--text);
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  background: var(--input);
  text-align: center;
}

.footer {
  text-align: center;
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
  <div class="toggle" onclick="toggleTheme()">🌙</div>

  <h1>🌱 Kalkulator sadzonek</h1>

  <select id="type">
    <option value="">-- Wybierz odmianę --</option>
    <option value="amnezja">Amnezja</option>
    <option value="kush">Kush</option>
    <option value="shaman">Shaman</option>
    <option value="mimosa">Mimosa</option>
  </select>

  <input type="number" id="amount" placeholder="Ilość (max 100)" max="100">

  <button onclick="calculate()">Oblicz</button>

  <div class="result" id="result"></div>

  <div class="footer">By Sooga</div>
</div>

<script>
// 🌗 THEME
function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

// zapamiętywanie
if (localStorage.getItem("theme") === "light") {
  document.body.classList.add("light");
}

// 🔥 LIMIT zależny od odmiany
const typeSelect = document.getElementById("type");
const amountInput = document.getElementById("amount");

typeSelect.addEventListener("change", function() {
  switch(this.value) {
    case "amnezja":
      amountInput.max = 100;
      amountInput.placeholder = "Ilość (max 100)";
      break;
    case "kush":
      amountInput.max = 50;
      amountInput.placeholder = "Ilość (max 50)";
      break;
    case "shaman":
      amountInput.max = 25;
      amountInput.placeholder = "Ilość (max 25)";
      break;
    case "mimosa":
      amountInput.max = 12; 
      amountInput.placeholder = "Ilość (max 12)";
      break;
    default:
      amountInput.removeAttribute("max");
      amountInput.placeholder = "Ilość (brak limitu)";
  }
});

// 📊 kalkulator
function calculate() {
  const type = typeSelect.value;
  const amount = parseInt(amountInput.value);
  const resultDiv = document.getElementById("result");

  if (!type || !amount) {
    resultDiv.innerHTML = "⚠️ Uzupełnij wszystkie pola!";
    return;
  }

  // Limity
  if ((type === "amnezja" && amount > 100) || 
      (type === "kush" && amount > 50) || 
      (type === "shaman" && amount > 25) ||
      (type === "mimosa" && amount > 12)) {
    resultDiv.innerHTML = "❌ Przekroczono limit sadzonek!";
    return;
  }

  let water = "";
  let fertilizer = "";
  let yieldMin = 0;
  let points = 0;
  let plantingType = "Gruntowe sadzenie";

  if (type === "amnezja") {
    water = `${amount * 5} x 1L <small>(jedna daje 50%)</small>`;
    fertilizer = `${amount * 2} x 0.3L <small>(jedna daje 60%)</small>`;
    yieldMin = amount * 36;
    points = amount * 1;
  } else if (type === "kush") {
    water = `${amount * 10} x 1L <small>(jedna daje 25%)</small><br>${amount * 5} x 2L <small>(jedna daje 50%)</small>`;
    fertilizer = `${amount * 4} x 0.3L <small>(jedna daje 30%)</small><br>${amount * 2} x 0.6L <small>(jedna daje 60%)</small>`;
    yieldMin = amount * 72;
    points = amount * 2;
  } else if (type === "shaman") {
    water = `${amount * 21} x 1L <small>(jedna daje 13%)</small><br>` +
            `${amount * 10} x 2L (.soon)<br>` +
            `${amount * 4} x 5L (.soon)`;
    fertilizer = `${amount * 8} x 0.3L <small>(jedna daje 20%)</small>`;
    yieldMin = amount * 130;
    points = amount * 4;
    plantingType = "Gruntowe sadzenie <span style='color:red;'>(Ryzyko zachorowania!)</span>";
  } else if (type === "mimosa") {
    water = `${amount * 12} x 1L <small>(jedna daje 40%)</small>`;
    fertilizer = `${amount * 3} x 0.3L <small>(jedna daje 50%)</small>`;
    yieldMin = amount * 90;
    points = amount * 3;
  }

  resultDiv.innerHTML = `
    🌱 <b>${amount}</b> sadzonek<br>
    <small>${plantingType}</small><br><br>
    🥤 Woda:<br>${water}<br><br>
    ⛱️ Nawóz:<br>${fertilizer}<br><br>
    ⏰ Czas: <b>${type === "shaman" ? "1 godzina" : "2 godziny"}</b><br>
    🌿 Plony: <b>~${yieldMin}</b><br>
    🔹 Punkty upraw: <b>${points}</b>
  `;
}
</script>
