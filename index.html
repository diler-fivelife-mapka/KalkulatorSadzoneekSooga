<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator sadzonek</title>

<style>
:root {
  --bg: linear-gradient(135deg, #1f2937, #111827);
  --card: rgba(255,255,255,0.05);
  --text: white;
  --input: rgba(0,0,0,0.4);
  --border: rgba(255,255,255,0.1);
}

.light {
  --bg: linear-gradient(135deg, #e5e7eb, #f9fafb);
  --card: rgba(255,255,255,0.8);
  --text: #111;
  --input: rgba(255,255,255,0.9);
  --border: rgba(0,0,0,0.1);
}

* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.container {
  width: 480px;
  padding: 30px;
  border-radius: 16px;
  background: var(--card);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  border: 1px solid var(--border);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  cursor: pointer;
  font-size: 18px;
}

select, input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--input);
  color: var(--text);
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  background: var(--input);
  text-align: center;
}

.footer {
  text-align: center;
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
  <div class="toggle" onclick="toggleTheme()">🌙</div>

  <h1>🌱 Kalkulator sadzonek</h1>

  <select id="type">
    <option value="">-- Wybierz odmianę --</option>
    <option value="amnezja">Amnezja</option>
    <option value="kush">Kush</option>
    <option value="shaman">Shaman</option>
    <option value="mimosa">Mimosa</option>
  </select>

  <input type="number" id="amount" placeholder="Ilość (max 100)" max="100">

  <button onclick="calculate()">Oblicz</button>

  <div class="result" id="result"></div>

  <div class="footer">By Sooga</div>
</div>

<script>
// 🌗 THEME
function toggleTheme() {
  document.body.classList.toggle("light");

  const isLight = document.body.classList.contains("light");
  localStorage.setItem("theme", isLight ? "light" : "dark");
}

// zapamiętywanie
if (localStorage.getItem("theme") === "light") {
  document.body.classList.add("light");
}

// 📊 kalkulator
function calculate() {
  const type = document.getElementById("type").value;
  const amount = parseInt(document.getElementById("amount").value);
  const resultDiv = document.getElementById("result");

  if (!type || !amount) {
    resultDiv.innerHTML = "⚠️ Uzupełnij wszystkie pola!";
    return;
  }

  if (type === "amnezja" && amount > 100) {
    resultDiv.innerHTML = "❌ Maksymalnie 100 sadzonek!";
    return;
  }

  let water = amount * 5;
  let fertilizer = amount * 2;
  let yieldMin = amount * 36;

  resultDiv.innerHTML = `
    🌱 <b>${amount}</b> sadzonek<br><br>
    🥤 Woda: <b>${water}</b> L<br>
    ⛱️ Nawóz: <b>${fertilizer}</b><br><br>
    ⏰ Czas: <b>2 godziny</b><br>
    🌿 Plony: <b>~${yieldMin}</b>
  `;
}
</script>

</body>
</html>
