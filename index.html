<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator sadzonek</title>
<style>
body { font-family: Arial; background:#111; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
.container { background:#222; padding:20px; border-radius:10px; width:400px;}
input, select, button { width:100%; padding:10px; margin:5px 0; border-radius:5px; border:none;}
button { background:#22c55e; color:white; cursor:pointer;}
.result { margin-top:15px; background:#333; padding:10px; border-radius:5px;}
</style>
</head>
<body>
<div class="container">
  <h2>Kalkulator sadzonek</h2>
  <label>Odmiana:</label>
  <select id="type">
    <option value="">-- wybierz --</option>
    <option value="amnezja">Amnezja</option>
    <option value="kush">Kush</option>
    <option value="shaman">Shaman</option>
    <option value="mimosa">Mimosa</option>
  </select>
  <label>Ilość sadzonek:</label>
  <input type="number" id="amount" placeholder="np. 10">
  <button onclick="calculate()">Oblicz</button>
  <div class="result" id="result">Wprowadź dane</div>
</div>
<script src="script.js"></script>
</body>
</html>
