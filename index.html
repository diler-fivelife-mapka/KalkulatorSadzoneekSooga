<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator sadzonek</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: linear-gradient(135deg, #0f172a, #020617);
  --card: rgba(15, 23, 42, 0.9);
  --accent: #22c55e;
  --text: #e5e7eb;
  --muted: #94a3b8;
  --border: rgba(255,255,255,0.08);
}
* { box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:var(--bg);color:var(--text); }

.container {
  width:540px;
  padding:30px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter:blur(16px);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  border:1px solid var(--border);
}

h1 { text-align:center; margin-bottom:5px; font-size:24px; }
.subtitle { text-align:center; color:var(--muted); font-size:13px; margin-bottom:25px; }
label { font-size:13px; color:var(--muted); display:block; margin-bottom:5px; }
select, input { width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:rgba(0,0,0,0.4); color:var(--text); margin-bottom:15px; outline:none; transition:0.2s; }
select:focus, input:focus { border-color:var(--accent); }
button { width:100%; padding:14px; border:none; border-radius:10px; background:var(--accent); color:white; cursor:pointer; font-weight:600; font-size:14px; transition:0.2s; }
button:hover { opacity:0.9; }
.result { margin-top:20px; padding:18px; border-radius:12px; background:rgba(0,0,0,0.5); border:1px solid var(--border); font-size:14px; line-height:1.6; }
.footer { text-align:center; margin-top:15px; font-size:12px; color:var(--muted); opacity:0.8; }
</style>
</head>
<body>

<div class="container">
  <h1>🌱 Kalkulator sadzonek</h1>
  <div class="subtitle">Oblicz plony i wymagania uprawy</div>

  <label>Odmiana</label>
  <select id="type">
    <option value="">-- wybierz --</option>
    <option value="amnezja">Amnezja</option>
    <option value="kush">Kush</option>
    <option value="shaman">Shaman</option>
    <option value="mimosa">Mimosa</option>
  </select>

  <label>Ilość sadzonek</label>
  <input type="number" id="amount" placeholder="np. 10">

  <button onclick="calculate()">Oblicz</button>

  <div class="result" id="result">▶️ Wprowadź dane, aby zobaczyć wynik</div>

  <div class="footer">By Sooga</div>
</div>

<script src="script.js"></script>
</body>
</html>
